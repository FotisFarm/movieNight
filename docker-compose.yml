services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - MN_PASSWORD=${MN_PASSWORD:-changeme}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret}
    restart: unless-stopped

volumes:
  sqlite_data:
